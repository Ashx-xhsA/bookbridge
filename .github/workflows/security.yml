name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gate 1: Secrets detection
      - name: Gitleaks — secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Gate 2: Dependency scanning (Next.js)
      - name: npm audit — dependency vulnerabilities
        if: hashFiles('package.json') != ''
        run: npm ci && npm audit --audit-level=high

      # Gate 3: Python SAST (Bandit)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bandit — Python SAST
        run: |
          pip install bandit[toml]
          bandit -r bookbridge/ -ll -f json -o bandit-report.json || true
          bandit -r bookbridge/ -ll -f txt || true

      # Gate 3: JS/TS SAST (Semgrep — free OSS rules, no account needed)
      - name: Semgrep — JS/TS SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
        continue-on-error: true

      # Post automated security summary as PR comment (no API cost)
      - name: Post security summary to PR
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, os, subprocess

          try:
              data = json.loads(pathlib.Path('bandit-report.json').read_text())
              results = data.get('results', [])
              high = [i for i in results if i['issue_severity'] == 'HIGH']
              med  = [i for i in results if i['issue_severity'] == 'MEDIUM']
              lines = []
              for i in (high + med)[:10]:
                  lines.append(f"- **{i['issue_severity']}** {i['issue_text']} — `{i['filename']}:{i['line_number']}`")
              summary = '\n'.join(lines) if lines else '- No HIGH/MEDIUM issues found'
          except Exception:
              summary = '- Bandit report not available'

          body = f"""## Automated Security Scan

**Gates checked:** Gitleaks (secrets) · npm audit (deps) · Bandit (Python SAST) · Semgrep (JS/TS OWASP)

### Bandit — Python SAST
{summary}

> **Note:** Run `/security-review` locally via Claude Code for a full AI-assisted review before merging."""

          pathlib.Path('pr_comment.txt').write_text(body)
          PYEOF

          gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
