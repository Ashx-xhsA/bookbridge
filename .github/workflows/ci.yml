name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=bookbridge --cov-report=term
      - run: ruff check bookbridge/ tests/

  nextjs:
    name: Next.js — lint, typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bookbridge-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bookbridge-next/package-lock.json
      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Security scan (npm audit)
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check
        continue-on-error: true

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test:run

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: bookbridge-next/coverage/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: nextjs
    defaults:
      run:
        working-directory: bookbridge-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bookbridge-next/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium

      - name: Build Next.js for E2E
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: bookbridge-next/playwright-report/

  ai-review:
    name: AI PR review (Claude Code)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Anthropic API key
        id: key-check
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not configured — AI PR review will be skipped. Add the secret under Settings → Secrets and variables → Actions to enable."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code AI reviewer
        if: steps.key-check.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request using the C.L.E.A.R. framework
            (Correct, Legible, Efficient, Abstracted, Risk-aware).
            Focus on correctness, edge cases, and OWASP Top 10 risks
            (auth + ownership checks, Zod input validation, SSRF on
            Worker calls, secret hygiene). Post findings as a PR comment.
